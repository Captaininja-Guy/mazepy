<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="fill_animation.css">
    
    <title>Maze Filler</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.4/full/pyodide.js"></script>



    <div class="container" id="video"></div>
    <div class="loader" id="loader"></div>
    
    <select name="Maze Type" id="type" class="type">
        <option selected>--Select Maze Shape--</option>
    </select>

    
    <select name="Algorithm" id="algo" class="algo">
        <option selected>--Select Maze Algorithm--</option>
        <option> First Select Maze Shape</option>
    </select>

    <select name="Size" id="maze_size" class="size">
        <option selected>--Select Maze Size--</option>
        <option>Small (6x6)</option>
        <option>Medium (12x12)</option>
        <option>Large (20x20)</option>
    </select>
    
    <input type="submit" id="gen" class="gen" value="Generate">
    
    <div class="basecolortext">Select Start Color: </div>
    <input type="color" id="basecolor" value="#ff0000" class="basecolor">

    <div class="endcolortext">Select End Color: </div>
    <input type="color" id="endcolor" value="#ff0000" class="endcolor">

    <script src="fill_animation.js"></script>
</body>
</html>
